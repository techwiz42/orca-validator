# orca.cyberiad.ai → orca-validator api container.
# Mirrors the builder's subdomain-vhost pattern; TLS via the existing wildcard cert.

server {
    listen 80;
    server_name orca.cyberiad.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name orca.cyberiad.ai;

    # Reuse the existing wildcard/cert story on the droplet.
    ssl_certificate     /etc/letsencrypt/live/builder.cyberiad.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/builder.cyberiad.ai/privkey.pem;

    client_max_body_size 25m;   # contract PDFs

    location / {
        proxy_pass http://127.0.0.1:8080;   # api service's published port (compose)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
