# orca.cyberiad.ai → orca-validator web UI (Next.js, compose `web` on :3000).
#
# Matches the droplet's existing *.cyberiad.ai app vhosts (memchat/paperclip): a PER-DOMAIN
# Let's Encrypt cert + an ACME-challenge location (NOT the builder wildcard — that cert covers
# *.builder.cyberiad.ai, not orca.cyberiad.ai). The raw API stays internal; the web proxies to
# it server-side. Expose the API on its own subdomain if programmatic access is needed.
#
# Prereqs before `nginx -t && systemctl reload nginx`:
#   1. DNS: an A record  orca.cyberiad.ai -> <droplet IP>  (it does not resolve yet).
#   2. Cert: certbot certonly --webroot -w /var/www/certbot -d orca.cyberiad.ai
#   3. The `web` compose service is up and publishing :3000.

server {
    listen 80;
    listen [::]:80;
    server_name orca.cyberiad.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orca.cyberiad.ai;

    ssl_certificate /etc/letsencrypt/live/orca.cyberiad.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orca.cyberiad.ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 25m;   # contract PDFs

    location / {
        proxy_pass http://127.0.0.1:3000;   # compose `web` service
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/orca.cyberiad.access.log;
    error_log /var/log/nginx/orca.cyberiad.error.log;
}
