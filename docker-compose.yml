# Co-located on the shared droplet → every service is CPU/mem-limited and uses its OWN
# Postgres/Redis (never the builder's), so it cannot starve neighbouring workloads.
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://orca:orca@postgres:5432/orca
      REDIS_URL: redis://redis:6379/0
      API_KEY: ${API_KEY:-changeme-dev-key}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}        # set to enable AI analysis + revision
      TOGETHER_MODEL: ${TOGETHER_MODEL:-meta-llama/Llama-3.3-70B-Instruct-Turbo}
      TOGETHER_DAILY_TOKEN_BUDGET: ${TOGETHER_DAILY_TOKEN_BUDGET:-2000000}  # app-level spend cap
      PARSER_URL: http://parser:9000                 # untrusted-file parsing runs in isolation
    ports:
      - "127.0.0.1:8085:8000"   # host-local only; the web service reaches it via the compose net
    depends_on:
      - postgres
      - redis
      - parser
    volumes:
      - blobs:/app/data/blobs
    networks: [default, parsernet]
    cpus: 1.0
    mem_limit: 1g

  # Isolated, sandboxed document parser: runs PyMuPDF/tesseract/python-docx on untrusted uploads
  # with NO secrets, NO database, and NO network egress (parsernet is internal). A parser RCE
  # has nothing to steal and nowhere to exfiltrate. Same image, different command.
  parser:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.parser.app:app --host 0.0.0.0 --port 9000
    networks: [parsernet]
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    cpus: 1.0
    mem_limit: 1g

  # NOTE: MVP runs validation in-process via FastAPI BackgroundTasks. The dedicated
  # Redis worker (task §4.1) is added here as a second service behind the same image.

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: orca
      POSTGRES_PASSWORD: orca
      POSTGRES_DB: orca
    volumes:
      - pgdata:/var/lib/postgresql/data
    cpus: 1.0
    mem_limit: 512m

  redis:
    image: redis:7
    cpus: 0.5
    mem_limit: 256m

  # Thin Next.js UI. Proxies to `api` server-side (API key never reaches the browser).
  # Route orca.cyberiad.ai here for the human UI; the raw API stays on `api` (:8080) for
  # programmatic/CI use.
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://api:8000
      API_KEY: ${API_KEY:-changeme-dev-key}
    ports:
      - "127.0.0.1:3000:3000"   # nginx (orca.cyberiad.ai) proxies here; not internet-exposed
    depends_on:
      - api
    cpus: 0.5
    mem_limit: 512m

networks:
  parsernet:
    internal: true   # no route to the internet → the parser cannot exfiltrate

volumes:
  pgdata:
  blobs:
